project_id = "hr-portal"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_signup = false

[auth.email]
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "25MiB"

[storage.buckets.documents]
public = false
file_size_limit = "25MiB"

[storage.buckets.receipts]
public = false
file_size_limit = "10MiB"

[edge_runtime]
enabled = true

[analytics]
enabled = false
